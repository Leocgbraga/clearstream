<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearStream</title>
  </head>
  <body>
    <main id="app">
      <header><h1>ClearStream</h1></header>
      <ul id="list" hidden></ul>
      <p id="empty" hidden>No streams found on this tab yet.</p>
      <button id="scan" type="button">Find streams on this page</button>
      <label id="passiveRow">
        <input type="checkbox" id="passive" />
        <span>Auto-detect on all sites <em>(grants site access)</em></span>
      </label>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
