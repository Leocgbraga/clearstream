<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearStream Player</title>
  </head>
  <body>
    <div id="stage">
      <div id="topbar">
        <h1 id="title">ClearStream</h1>
        <button id="copy" type="button" hidden>Copy stream URL</button>
      </div>

      <div id="screen">
        <!-- media-chrome supplies the clean control bar + quality (rendition) menu + Live button. -->
        <media-controller id="controller" tabindex="0" defaultstreamtype="live" aria-label="Video player">
          <video slot="media" id="video" playsinline crossorigin muted></video>
          <media-control-bar>
            <media-play-button></media-play-button>
            <media-mute-button></media-mute-button>
            <media-volume-range></media-volume-range>
            <media-time-range></media-time-range>
            <media-time-display showduration></media-time-display>
            <media-live-button></media-live-button>
            <media-rendition-menu-button></media-rendition-menu-button>
            <media-pip-button></media-pip-button>
            <media-fullscreen-button></media-fullscreen-button>
          </media-control-bar>
          <media-rendition-menu hidden anchor="media-rendition-menu-button"></media-rendition-menu>
        </media-controller>

        <!-- Connecting / autoplay-blocked / all-failed states render here, over the video. -->
        <div id="overlay" hidden>
          <div id="spinner" hidden></div>
          <p id="overlayMsg"></p>
          <button id="overlayBtn" type="button" hidden></button>
        </div>

        <button id="unmute" type="button" hidden>🔊 Tap for sound</button>
      </div>

      <div id="status" role="status" aria-live="polite" hidden></div>
      <label id="sourcesRow" hidden>Source <select id="sources"></select></label>
      <p id="hint">Open this from the ClearStream popup with a detected stream.</p>
      <p id="shortcuts" aria-hidden="true">Space play · F full screen · M mute · ← → seek · P picture-in-picture</p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
