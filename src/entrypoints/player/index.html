<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearStream Player</title>
  </head>
  <body>
    <div id="stage">
      <!-- media-chrome supplies the clean control bar + quality (rendition) menu.
           Phase 2 wires hls.js to <video> and populates renditions from hls.levels. -->
      <media-controller id="controller">
        <video slot="media" id="video" playsinline crossorigin></video>
        <media-control-bar>
          <media-play-button></media-play-button>
          <media-mute-button></media-mute-button>
          <media-volume-range></media-volume-range>
          <media-time-range></media-time-range>
          <media-time-display showduration></media-time-display>
          <media-rendition-menu-button></media-rendition-menu-button>
          <media-pip-button></media-pip-button>
          <media-fullscreen-button></media-fullscreen-button>
        </media-control-bar>
        <media-rendition-menu hidden anchor="media-rendition-menu-button"></media-rendition-menu>
      </media-controller>
      <p id="hint">Loading…</p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
