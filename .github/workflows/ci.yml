name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Static gate suite — deterministic, no network/browser. Mirrors `pnpm check`:
  # tsc, eslint, vitest, build (chrome+firefox), bundle budget, no-remote-code audit, web-ext lint.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # Live end-to-end smoke: load the built extension in real Chromium and assert actual playback
  # (readyState>=3 && currentTime>0), detection, the DNR header rule, and failover. Headed Chromium
  # under xvfb (extensions can't load in headless-shell). Network-dependent (fetches the Mux test
  # stream); kept separate from `check` so a transient network blip doesn't mask a real gate failure.
  e2e-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: xvfb-run -a node scripts/verify.mjs
      # Hostile-pattern fixtures (local server, no external network): detection matrix across
      # concealment patterns + VOD/live-ify/failover playback + Referer-gating.
      - run: xvfb-run -a node scripts/verify-fixtures.mjs
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chromium-screenshots
          path: /tmp/cs-shots
          if-no-files-found: ignore

  # Live Firefox smoke (Selenium + geckodriver): real playback in the Gecko engine + popup render.
  e2e-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795 # v1
      - uses: browser-actions/setup-geckodriver@fac5b0424c584257f32cf12c5eb4ba86014c34f8 # latest
      - run: pnpm build:firefox
      - run: xvfb-run -a node scripts/verify-firefox.mjs # geckodriver finds firefox on PATH
