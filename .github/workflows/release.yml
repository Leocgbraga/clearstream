name: Release

# Trigger: push a version tag (e.g. `v0.1.0`). See RELEASING.md for the flow.
# Always produces: built+zipped chrome/firefox/edge artifacts, a provenance attestation, and a
# GitHub Release. Store publishing (Chrome/Edge/AMO) runs ONLY when the matching secrets are set,
# so the workflow is safe to run before any store account exists — you just get the GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # provenance attestation
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release # gate store-publish behind a protected environment (add manual approval here)
    env:
      # Mapped at job level so step-level `if:` can detect whether each store is configured.
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Never ship a tag that doesn't pass the gates.
      - run: pnpm check

      - id: vars
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Build + zip all three targets (WXT names them clearstream-<version>-<target>.zip).
      - run: pnpm zip
      - run: pnpm zip:firefox
      - run: pnpm exec wxt zip -b edge

      - name: Provenance attestation
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: '.output/*.zip'

      - name: GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: .output/*.zip
          generate_release_notes: true

      # ---- Store publishing (each step is a no-op unless its secrets are configured) ----
      - name: Publish to Chrome Web Store
        if: ${{ env.CHROME_EXTENSION_ID != '' }}
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: .output/clearstream-${{ steps.vars.outputs.version }}-chrome.zip
          extension-id: ${{ env.CHROME_EXTENSION_ID }}
          client-id: ${{ env.CHROME_CLIENT_ID }}
          client-secret: ${{ env.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ env.CHROME_REFRESH_TOKEN }}

      - name: Publish to Edge Add-ons
        if: ${{ env.EDGE_PRODUCT_ID != '' }}
        uses: wdzeng/edge-addon@9881f57720358040d079eaa06a4596dc9c273eb6 # v2
        with:
          product-id: ${{ env.EDGE_PRODUCT_ID }}
          zip-path: .output/clearstream-${{ steps.vars.outputs.version }}-edge.zip
          client-id: ${{ env.EDGE_CLIENT_ID }}
          api-key: ${{ env.EDGE_API_KEY }}

      - name: Publish to Firefox AMO (sign + submit, listed)
        if: ${{ env.AMO_API_KEY != '' }}
        uses: wdzeng/firefox-addon@3184ee491b500e080885e046051366a4228c6e5d # v1
        with:
          addon-guid: clearstream@leocgbraga.github.io
          xpi-path: .output/clearstream-${{ steps.vars.outputs.version }}-firefox.zip
          # AMO requires the source for a bundled/built add-on so reviewers can reproduce it.
          source-file-path: .output/clearstream-${{ steps.vars.outputs.version }}-sources.zip
          api-key: ${{ env.AMO_API_KEY }}
          api-secret: ${{ env.AMO_API_SECRET }}
